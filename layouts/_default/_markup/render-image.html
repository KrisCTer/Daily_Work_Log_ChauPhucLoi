{{- $src := .Destination -}}
{{- if and (not (strings.HasPrefix $src "http")) (not (strings.HasPrefix $src "//")) (strings.HasPrefix $src "/") -}}
  {{- $src = printf "%s%s" (strings.TrimRight "/" site.BaseURL) $src -}}
{{- end -}}
<img src="{{ $src }}" alt="{{ .Text }}"{{ with .Title }} title="{{ . }}"{{ end }} />
